# Default values for Argo Rollouts
# https://github.com/argoproj/argo-helm/blob/main/charts/argo-rollouts/values.yaml

# Controller configuration
controller:
  # Number of replicas for the controller
  replicas: 1
  
  # Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  # Metrics configuration for Prometheus scraping
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: prometheus
      interval: 30s
      scrapeTimeout: 10s
  
  # Enable RBAC creation
  rbac:
    create: true

# Dashboard configuration (optional UI)
dashboard:
  enabled: true
  
  # Resource limits
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  
  # Service configuration
  service:
    type: ClusterIP
    port: 3100
  
  # Ingress configuration (optional)
  ingress:
    enabled: false
    # hosts:
    #   - argo-rollouts.local

# CRD configuration
crds:
  # Keep CRDs on chart uninstall
  keep: false
  # Install CRDs as part of the chart
  install: true

# Notifications configuration
notifications:
  enabled: false

# Additional arguments for the controller
extraArgs: []

# Environment variables for the controller
extraEnv: []

# Service account configuration
serviceAccount:
  create: true
  annotations: {}
